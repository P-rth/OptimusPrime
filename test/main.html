<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Override: Human Verified</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Using a system monospace stack to ensure the weights render nicely */
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background: 
                linear-gradient(
                    rgba(10, 14, 23, 0.85), 
                    rgba(10, 14, 23, 0.95)
                ),
                url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 3rem;
            background: rgba(16, 24, 39, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.05);
            opacity: 0;
            animation: bootUpBox 1s ease-out forwards;
        }

        h1 {
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 800; /* EXTRA BOLD: Heaviest weight for the main tagline */
            color: #ffffff;
            letter-spacing: -0.05em;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            min-height: 1.2em; 
        }

        .highlight {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            transition: all 0.3s ease;
        }

        p.subtitle {
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 600; /* SEMI-BOLD: Less bold than H1 and Sys Admins */
            color: #8b9bb4;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            min-height: 1.2em;
            margin-bottom: 2rem; 
        }

        .team-section {
            border-top: 1px solid rgba(0, 255, 204, 0.15);
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }

        p.team-names {
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            font-weight: 700; /* BOLD: Solid bold weight for the names */
            color: #d0d5db;
            letter-spacing: 0.15em;
            min-height: 1em;
        }

        .team-names span {
            color: #e2e8f0; /* Making the names slightly brighter to stand out against the bold */
        }

        @keyframes bootUpBox {
            0% {
                opacity: 0;
                box-shadow: 0 0 0 rgba(0, 255, 204, 0);
            }
            100% {
                opacity: 1;
                box-shadow: 0 0 30px rgba(0, 255, 204, 0.05);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title" data-value="CONGRATS. 100% HUMAN DNS FILTER CLEARED."></h1>
        <p id="subtitle" class="subtitle" data-value="Access granted. Must be your lucky day."></p>
        
        <div class="team-section">
            <p id="team" class="team-names" data-value="SYS.ADMINS: PARTH // HARDIK // JAI // LAKSHAY"></p>
        </div>
    </div>

    <script>
        const characters = "ABEFGHLOR012389!@$&)+";
        
        function decryptEffect(element, speed = 100, delay = 0, callback = null) {
            const targetText = element.dataset.value;
            let iterations = 0;
            
            setTimeout(() => {
                const interval = setInterval(() => {
                    element.innerText = targetText
                        .split("")
                        .map((letter, index) => {
                            if(letter === " ") return " ";
                            if(index < iterations) return targetText[index];
                            return characters[Math.floor(Math.random() * characters.length)];
                        })
                        .join("");

                    if(iterations >= targetText.length){
                        clearInterval(interval);
                        if(callback) callback(element);
                    }
                    
                    iterations += 1 / 3; 
                }, speed);
            }, delay);
        }

        window.onload = () => {
            const titleEl = document.getElementById("title");
            const subtitleEl = document.getElementById("subtitle");
            const teamEl = document.getElementById("team");

            // Step 1: Decrypt title
            decryptEffect(titleEl, 30, 200, (el1) => {
                el1.innerHTML = el1.dataset.value.replace(
                    "100% HUMAN", 
                    "<span class='highlight'>100% HUMAN</span>"
                );
                
                // Step 2: Start subtitle ONLY AFTER title finishes
                decryptEffect(subtitleEl, 20, 300, (el2) => {
                    
                    // Step 3: Start team names ONLY AFTER subtitle finishes
                    decryptEffect(teamEl, 15, 300, (el3) => {
                        el3.innerHTML = el3.dataset.value.replace(/\/\//g, "<span class='highlight'>//</span>");
                    });
                });
            });
        };
    </script>
</body>
</html>
